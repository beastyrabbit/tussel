pre-commit:
  parallel: true
  commands:
    biome:
      run: pnpm lint
    test:
      run: pnpm test
    gitleaks:
      run: |
        if command -v gitleaks >/dev/null 2>&1; then
          gitleaks protect --staged --config .gitleaks.toml
        else
          echo "gitleaks not installed; skipping"
        fi
